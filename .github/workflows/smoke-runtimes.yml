name: smoke-runtimes

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke-runtimes:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 11.5.2

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - uses: oven-sh/setup-bun@v2

      - uses: denoland/setup-deno@v2

      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm smoke:runtimes --ci
